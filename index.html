<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Stopwatch</title>
    <!-- Import Google Font Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Import Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Background Animated Shapes for Glassmorphism effect -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="app-wrapper">
        <div class="stopwatch-card">
            <div class="header">
                <h2><i class="ph ph-timer"></i> Stopwatch</h2>
            </div>

            <div class="display-container">
                <div class="time-display" id="display">
                    <span id="minutes">00</span><span class="colon">:</span><span id="seconds">00</span><span
                        class="ms-separator">.</span><span id="milliseconds">00</span>
                </div>
            </div>

            <div class="controls">
                <button id="lapBtn" class="btn btn-secondary" aria-label="Lap" disabled>
                    <i class="ph-bold ph-flag"></i> Add Lap
                </button>
                <div class="main-controls">
                    <button id="startPauseBtn" class="btn btn-primary start" aria-label="Start or Pause">
                        <i class="ph-fill ph-play" id="startIcon"></i>
                        <span id="startText">Start</span>
                    </button>
                    <button id="resetBtn" class="btn btn-danger" aria-label="Reset">
                        <i class="ph-bold ph-arrow-counter-clockwise"></i> Reset
                    </button>
                </div>
            </div>

            <div class="laps-section">
                <div class="laps-header">
                    <h3>Lap Times</h3>
                    <button id="clearLapsBtn" class="btn-text" disabled>Clear All</button>
                </div>
                <div class="laps-container">
                    <ul id="lapsList" class="laps-list">
                        <!-- Laps will be injected here via JS -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
